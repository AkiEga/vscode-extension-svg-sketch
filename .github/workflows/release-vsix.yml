name: Release VSIX

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'release/**'   # VSIX コミット自身による再トリガーを防止

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # release/ へのコミット & プッシュに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Package VSIX
        run: |
          mkdir -p release
          npx @vscode/vsce package --out release/

      - name: Commit and push VSIX
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/
          if git diff --cached --quiet release/; then
            echo "No changes in release/, skipping commit."
          else
            git commit -m "chore: update VSIX release [skip ci]"
            git push
          fi
